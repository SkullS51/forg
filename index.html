

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID-METAL: S-1792 KERNEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #030303;
            color: #ff0000;
            margin: 0;
            padding: 0;
            user-select: none;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff0000;
            border: 2px solid black;
        }
        .glitch-text {
            text-shadow: 2px 0 #ff0000, -2px 0 #330000;
            animation: text-jitter 0.1s infinite;
        }
        @keyframes text-jitter {
            0% { transform: translate(0,0); }
            33% { transform: translate(2px, -1px); }
            66% { transform: translate(-2px, 1px); }
            100% { transform: translate(0,0); }
        }
        .neon-border {
            box-shadow: 0 0 40px #ff0000, inset 0 0 20px #ff0000;
            border: 4px solid #ff0000;
        }
        @keyframes crt-flicker {
            0% { opacity: 0.99; }
            5% { opacity: 0.95; }
            10% { opacity: 0.99; }
            50% { opacity: 0.98; }
            100% { opacity: 1; }
        }
        .crt-overlay {
            pointer-events: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 6px 100%;
            z-index: 9999;
            animation: crt-flicker 0.15s infinite;
        }
        .scanline {
            width: 100%;
            height: 100%;
            z-index: 9998;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(255,0,0,0.1) 50%, rgba(0,0,0,0) 100%);
            position: fixed;
            top: -100%;
            animation: scanline_move 8s linear infinite;
        }
        @keyframes scanline_move {
            0% { top: -100%; }
            100% { top: 100%; }
        }
        .void-metal-title {
            animation: glitch-skew 1s infinite alternate;
        }
        @keyframes glitch-skew {
            0% { transform: skew(0deg); }
            5% { transform: skew(-5deg); filter: blur(1px); }
            10% { transform: skew(0deg); filter: blur(0); }
            15% { transform: skew(5deg); filter: blur(1px); }
            20% { transform: skew(0deg); filter: blur(0); }
            100% { transform: skew(0deg); }
        }
    </style>

</html>
